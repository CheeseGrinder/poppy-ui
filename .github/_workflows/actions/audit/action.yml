name: Audit
description: Run audit for specified package
inputs:
  package:
    description: The package to audit. Must have a audit-ci.json.
    type: string
    required: true
  node-version:
    description: The version of node to use.
    type: string
    default: 20.x
    required: false

permissions:
  security-events: write

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Dependencies
      run: npx lerna@5 bootstrap --scope @poppy-ui/${{ inputs.package }}
      shell: bash

    - name: Audit
      run: npx audit-ci@latest --config ./audit-ci.json
      working-directory: ./packages/${{ inputs.package }}
      shell: bash

