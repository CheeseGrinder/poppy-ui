# This is used with the label workflow which
# will triage pull requests and apply a label based on the
# paths that are modified in the pull request.
#
# For more information, see:
# https://github.com/actions/labeler

'feat':
  - '^feat:'
  - '^feature:'

'bug':
  - '^bug:'
  - '^fix:'

'documentation':
  - '^docs:'
  - '^documentation:'
  - '^stories:'

'dependencies':
  - '^dep'
  - '^dependency'

'chore':
  - '^chore:'
  - '^build:'
  - '^test:'
  - '^ci:'