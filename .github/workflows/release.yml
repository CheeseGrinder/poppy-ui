name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      pre_release:
        description: 'Pre-release identifier'
        required: false
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
        default: 'none'

permissions:
  id-token: write
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      next-version: ${{ steps.bumped-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current version
        id: current-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next-version
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const bump = context.payload.inputs.bump;
            const pre = context.payload.inputs.pre_release === 'none' ? null : context.payload.inputs.pre_release;
            const current = '${{ steps.current-version.outputs.version }}';
            const isPreRelease = current.includes('-');
            const isSamePre = isPreRelease && current.includes(`-${pre}.`);

            if (pre) {
              if (isSamePre) {
                return `prerelease --preid=${pre}`;
              }
              return `pre${bump} --preid=${pre}`;
            }
            return bump;

      - name: Bump version
        id: bumped-version
        run: |
          npm version ${{ steps.next-version.outputs.result }} --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Log release info
        run: |
          echo "📦 ${{ steps.current-version.outputs.version }} -> ${{ steps.bumped-version.outputs.version }}"
          echo "🔼 Bump: ${{ inputs.bump }}"
          echo "🏷️  Pre-release: ${{ inputs.pre_release }}"

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Audit
        uses: ./.github/workflows/actions/audit

      - name: Run Quality Checks
        uses: ./.github/workflows/actions/quality

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: [version, build]
    outputs:
      outcome: ${{ steps.npm-publish.outcome }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Update package.json
        run: npm version ${{ needs.version.outputs.next-version }} --no-git-tag-version

      - name: Publish to NPM
        id: npm-publish
        run: npm publish --access public --tag ${{ inputs.pre_release == 'none' && 'latest' || inputs.pre_release }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Add next tag
        if: inputs.pre_release != 'none'
        run: npm dist-tag add $(node -p "require('./package.json').name")@${{ needs.version.outputs.next-version }} next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: [version, publish]
    if: needs.publish.outputs.outcome == 'success' && (inputs.pre_release == 'none' || inputs.pre_release == 'rc')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6.2.2
        with:
          configuration: |
            {
              "categories": [
                {"title": "✨ Features", "labels": ["feat", "feature"]},
                {"title": "🐛 Bug Fixes", "labels": ["fix", "bug", "bugfix"]},
                {"title": "🎨 Style", "labels": ["style"]},
                {"title": "📝 Documentation", "labels": ["docs", "doc"]},
                {"title": "🔧 Chore", "labels": ["chore"]},
                {"title": "⚡️ Performance", "labels": ["perf", "performance"]},
                {"title": "🧹 Refactor", "labels": ["refactor"]},
                {"title": "🚀 CI", "labels": ["ci"]},
                {"title": "🏗️ Build", "labels": ["build"]}
              ]
            }

      - name: Commit version update
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add package.json
          git commit -m "chore(release): bump to ${{ needs.version.outputs.next-version }}"
          git tag v${{ needs.version.outputs.next-version }}
          git push origin v${{ needs.version.outputs.next-version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.next-version }}
          body: ${{ steps.changelog.outputs.result }}
          generate_release_notes: false
          prerelease: ${{ inputs.pre_release == 'rc' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}