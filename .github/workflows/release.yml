name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      pre-release:
        description: 'Pre-release identifier'
        required: false
        type: choice
        options:
          - alpha
          - beta
          - rc
        default: ''

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Audit
        uses: ./.github/workflows/actions/audit

      - name: Run Quality Checks
        uses: ./.github/workflows/actions/quality

      - name: Build
        run: bun run build

      - name: Get current version
        id: current-version
        run: echo "version=$(bun -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next-version
        uses: actions/github-script@v7
        with:
          script: |
            const { bump, pre_release: pre } = context.payload.inputs;
            const current = '${{ steps.current-version.outputs.version }}';
            
            const match = current.match(/^(\d+)\.(\d+)\.(\d+)(?:-([a-z]+)\.(\d+))?$/);
            if (!match) throw new Error('Invalid version format');
            
            let [, major, minor, patch, prereleaseType, prereleaseNum] = match.map(x => x || '0');
            major = parseInt(major); minor = parseInt(minor); patch = parseInt(patch);
            prereleaseNum = parseInt(prereleaseNum);
            
            if (bump === 'major') { major++; minor = 0; patch = 0; prereleaseType = null; prereleaseNum = 0; }
            else if (bump === 'minor') { minor++; patch = 0; prereleaseType = null; prereleaseNum = 0; }
            else if (bump === 'patch') { patch++; prereleaseType = null; prereleaseNum = 0; }
            
            if (pre) {
              if (pre === prereleaseType) {
                prereleaseNum++;
              } else {
                prereleaseType = pre;
                prereleaseNum = 0;
              }
              return `${major}.${minor}.${patch}-${pre}.${prereleaseNum}`;
            }
            return `${major}.${minor}.${patch}`;

      - name: Update package.json
        run: bunx npm version ${{ steps.next-version.outputs.result }} --no-git-tag-version

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6.2.2
        with:
          configuration: |
            {
              "categories": [
                {"title": "✨ Features", "labels": ["feat", "feature"]},
                {"title": "🐛 Bug Fixes", "labels": ["fix", "bug", "bugfix"]},
                {"title": "🎨 Style", "labels": ["style"]},
                {"title": "📝 Documentation", "labels": ["docs", "doc"]},
                {"title": "🔧 Chore", "labels": ["chore"]},
                {"title": "⚡️ Performance", "labels": ["perf", "performance"]},
                {"title": "🧹 Refactor", "labels": ["refactor"]},
                {"title": "🚀 CI", "labels": ["ci"]},
                {"title": "🏗️ Build", "labels": ["build"]}
              ]
            }

      - name: Publish to NPM
        id: npm-publish
        run: npm publish --access public

      - name: Commit version update
        if: steps.npm-publish.outcome == 'success' && (inputs.pre-release == '' || inputs.pre-release == 'rc')
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add package.json
          git commit -m "chore(release): bump to ${{ steps.next-version.outputs.result }}"
          git tag v${{ steps.next-version.outputs.result }}
          git push origin v${{ steps.next-version.outputs.result }}

      - name: Create GitHub Release
        if: steps.npm-publish.outcome == 'success' && (inputs.pre-release == '' || inputs.pre-release == 'rc')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next-version.outputs.result }}
          body: ${{ steps.changelog.outputs.result }}
          generate_release_notes: false
          prerelease: ${{ inputs.pre-release == 'rc' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}