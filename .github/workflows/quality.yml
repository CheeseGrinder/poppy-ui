name: Code Quality

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Format, Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Quality Checks
        uses: ./.github/workflows/actions/quality
