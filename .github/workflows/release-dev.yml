name: Release Dev

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  release-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Audit
        uses: ./.github/workflows/actions/audit

      - name: Run Quality Checks
        uses: ./.github/workflows/actions/quality

      - name: Build
        run: bun run build

      - name: Get current version
        id: current-version
        run: echo "version=$(bun -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Calculate dev version
        id: dev-version
        run: |
          SHA_SHORT=${GITHUB_SHA:0:7}
          echo "version=${{ steps.current-version.outputs.version }}-dev.${{ github.run_number }}.${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Update package.json
        run: bunx npm version ${{ steps.dev-version.outputs.version }} --no-git-tag-version

      - name: Publish to NPM
        run: npm publish --tag dev --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.dev-version.outputs.version }}';
            const body = `## 📦 Dev package available

            A dev version has been published to npm.

            **Install:**
            \`\`\`bash
            npm install @poppy-ui/vue@${version}
            \`\`\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes('## 📦 Dev package available'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
