name: Release Dev

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      dev-version: ${{ steps.dev-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate dev version
        id: dev-version
        run: |
          SHA_SHORT=${GITHUB_SHA:0:7}
          echo "version=0.0.0-dev.${{ github.run_number }}.${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Log dev version
        run: echo "📦 ${{ steps.dev-version.outputs.version }}"

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Audit
        uses: ./.github/workflows/actions/audit

      - name: Run Quality Checks
        uses: ./.github/workflows/actions/quality

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: [version, build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Update package.json
        run: bunx npm version ${{ needs.version.outputs.dev-version }} --no-git-tag-version

      - name: Publish to NPM
        run: npm publish --tag dev --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  comment-pr:
    runs-on: ubuntu-latest
    needs: [version, publish]
    steps:
      - name: Delete previous dev version
        uses: actions/github-script@v7
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes('## 📦 Dev package available'));
            if (!existing) {
              console.log('No previous dev version found, skipping.');
              return;
            }

            const match = existing.body.match(/npm install @poppy-ui\/vue@([\w.\-]+)/);
            if (!match) {
              console.log('Could not extract version from comment, skipping.');
              return;
            }

            const version = match[1];
            console.log(`Deleting @poppy-ui/vue@${version}`);

            const { execSync } = require('child_process');
            execSync(`npm unpublish @poppy-ui/vue@${version} --force`, {
              env: { ...process.env },
              stdio: 'inherit',
            });

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.version.outputs.dev-version }}';
            const body = `## 📦 Dev package available

            A dev version has been published to npm.

            **Install:**
            \`\`\`bash
            npm install @poppy-ui/vue@${version}
            \`\`\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes('## 📦 Dev package available'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }