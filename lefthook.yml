pre-push:
  jobs:
    - name: packages audit
      tags:
        - frontend
        - security
      run: bun audit --audit-level=high

pre-commit:
  parallel: true
  jobs:
    - name: Biome - Format
      run: bunx biome format
      glob:
        - "*.ts"
        - "*.vue"
        - "*.json"

    - name: Biome - Lint
      run: bunx biome lint
      glob:
        - "*.ts"
        - "*.vue"
        - "*.json"


    - name: Biome - Check
      run: bunx biome check
      glob:
        - "*.ts"
        - "*.vue"
        - "*.json"

    - name: vue-tsc
      run: bun typecheck
      glob:
        - "*.ts"
        - "*.vue"
